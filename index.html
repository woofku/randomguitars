        <script>
            function showRandomNumber(){
                document.getElementById("myNumber").innerHTML = rando(2, 469);
            }
        </script>
        <style>
            #myNumber{
                font-size:100px;
                text-align:center;
                margin:50px auto;
                font-family:Arial, sans-serif;
            }
        </style>
    </head>

        <div id="myNumber"></div>
