<html> <!-- code for random number by Aaron Plocharczyk -->
    <head> <!-- https://stackoverflow.com/questions/16116832/generating-a-random-number-for-html -->
        <script src="https://randojs.com/1.0.0.js"></script>
        <script>
            function showRandomNumber(){
                document.getElementById("myNumber").innerHTML = rando(2, 469);
				var tg = document.createElement("script");
				tg.setAttribute("src", `https://telegram.org/js/telegram-widget.js?23`);
				tg.setAttribute("data-telegram-post", `randomguitars/${rando(2, 469).toString()}`);
				tg.setAttribute("data-width", "100%");
				document.getElementById("wow").appendChild(tg);
            }
        </script>
        <style>
            #myNumber{
                font-size:100px;
                text-align:center;
                margin:50px auto;
                font-family:Arial, sans-serif;
            }
        </style>
    </head>
    <body onload="showRandomNumber();">
        <div id="myNumber"></div>
        <div id="wow"></div>
    </body>
</html>
